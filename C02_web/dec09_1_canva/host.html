<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title> Multiplayer - Host </title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
        $(function() {
            const CANVAS_SIZE = 666; 
            const BAR_WIDTH = 100;
            const BAR_HEIGHT = 15;
            
            // 호스트 바 위치 (하단)
            const HOST_BAR_Y = CANVAS_SIZE - BAR_HEIGHT; 
            // 게스트 바 위치 (상단, 호스트 화면 기준)
            const GUEST_BAR_Y = 0; 

            var canvas = document.getElementById('cv');
            var pen = canvas.getContext('2d'); 

            var ball = new Image();
            ball.src="probe.png"
            
            // --- Socket.IO 및 게임 상태 관리 변수 ---
            const socket = io('http://localhost:7777'); 
            var isHost = false; 
            var gameData = {}; // 서버에서 받아올 게임 상태
            var BALL_RADIUS = 25; // 서버와 동일하게 가정

            socket.on('role', (role) => {
                isHost = (role === 'host');
            });

            socket.on('game_state', (state) => {
                gameData = state;
            });
            
            socket.on('game_over', (result) => {
                gameData.isBallAlive = false;
            });

            // --- 게임 시작 이벤트 (Canvas 클릭) ---
            $("#cv").click(function() {
                if (isHost && !gameData.isBallAlive) {
                    socket.emit('start_game');
                }
            });

            ball.onload = function() {
                BALL_RADIUS = ball.width / 4; 
                
                setInterval(function(){
                    
                    pen.save();
                    
                    // 1. 화면 지우기 및 배경
                    if (gameData.isBallAlive) {
                        pen.fillStyle="#00000011";
                        pen.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                    } else {
                        pen.fillStyle="black";
                        pen.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                        pen.textAlign = 'center';
                        pen.fillStyle = 'red';
                        pen.font = 'bold 30px Arial';
                        if (isHost) {
                            pen.fillText('HOST: 클릭해서 게임 시작', CANVAS_SIZE / 2, CANVAS_SIZE / 2);
                        } else {
                            pen.fillText('GUEST: 호스트의 시작을 기다리는 중', CANVAS_SIZE / 2, CANVAS_SIZE / 2);
                        }
                    }

                    // 2. 공 그리기
                    if (gameData.isBallAlive) {
                        pen.shadowOffsetX=0;
                        pen.shadowOffsetY=0;
                        pen.shadowBlur=10;
                        pen.shadowColor="#2f4858";

                        pen.drawImage(ball, 
                            gameData.ballX - BALL_RADIUS, 
                            gameData.ballY - BALL_RADIUS
                        );
                    } 
                    
                    // 3. 바 그리기
                    
                    // Host Bar (자신의 바, 하단)
                    pen.shadowColor = "white";
                    pen.fillStyle = "#32d9bf";
                    pen.fillRect(gameData.hostBarX, HOST_BAR_Y, BAR_WIDTH, BAR_HEIGHT); 

                    // Guest Bar (상대방의 바, 상단)
                    pen.fillStyle = "red";
                    pen.fillRect(gameData.guestBarX, GUEST_BAR_Y, BAR_WIDTH, BAR_HEIGHT); 

                    pen.restore();

                }, 15);

                // --- 바 이동 조작 및 서버 전송 ---
                $("#cv").mousemove(function (e){
                    if (isHost) {
                        let mouseX = e.pageX - $(this).offset().left;
                        let newBarX = mouseX - (BAR_WIDTH / 2);

                        if (newBarX < 0) {
                            newBarX = 0;
                        } else if (newBarX + BAR_WIDTH > CANVAS_SIZE) {
                            newBarX = CANVAS_SIZE - BAR_WIDTH;
                        } 
                        
                        // 서버에 자신의 바 위치 전송
                        socket.emit('move_bar', newBarX);
                    }
                });
            };
        });
    </script>

    <style>
        canvas {
            border: darkslategray solid 2px
        }
    </style>

  </head>
  
  <body>
    <canvas id ="cv" width="666" height="666">
      IE 죽어
    </canvas>
</body>
</html>
