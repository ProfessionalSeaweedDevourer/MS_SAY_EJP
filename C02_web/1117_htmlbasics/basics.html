<!DOCTYPE html> <!--별도의 버전 명시 없으면 html5-->

<!--
    HTML
        웹 페이지의 '구조'를 정의하는 '디자인' 언어 - 인터프리터 방식.

    DOM(Document Object Model)
        <태그명 속성명 = "속성값"> 내용 </태그명>

-->

<html>
    <head> <!--문서 메타데이터-->
        <meta charset="UTF-8"> <!--문서의 문자 인코딩 방식 지정-->
        <title>HTML Basics</title> <!--웹 페이지 제목-->
    </head>
    <body> <!--본문-->
        <h1>HTML 기초</h1>
        <p>HTML은 웹 페이지의 구조를 정의하는 언어입니다.</p>
        <a href="https://www.example.com">예제 링크</a>
    </body>
</html>
