<!DOCTYPE html>
<meta charset="UTF-8">
<html>
    <head>
        <title>CSS 로드 테스트</title>
        <link rel="stylesheet" href="c01.css"> <!-- CSS 파일 연결 -->
    </head>
    <body>
        <!--
            CSS에서의 모든 DOM 요소는 박스 모델(Box Model)로 표현된다.
                -left, -right, -top, -bottom
                
                margin: 외부 여백
                
                border: 테두리
                
                padding: 내부 여백
                
                width/height: 콘텐츠 영역 크기

                position: 좌표 체계
                    absolute: 부모 요소 (html) 기준 > 좌상단을 (0,0) 으로 함
                    fixed: 화면 기준 > 스크롤과 무관하게 고정
                    relative: 자기 자신 기준

                left, right, top, bottom: 위치 지정

                z-index: 쌓임 순서 지정 (숫자가 클수록 위에 쌓이는, 레이어 개념)
        -->
        <div style="font-size: 30pt;"> TEST </div> <!-- 이렇게 직접 설정해도 됨 -->
        <h1>변경된 h1 테스트</h1>
    </body>
