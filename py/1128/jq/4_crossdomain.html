<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title> AJAX Parsing </title>
        <script src="jQuery.js"></script>

        <script>
            // 31일 예제와 기능적으로 동일.
            // AJAX: 비동기 js & XML. js를 활용한 비동기 통신으로 xml 가져옴
            // '동일 출처 정책': 외부 서버 데이터를 받아오면 브라우저가 거부함.
            

            // $.ajax({
            //     url: "주소",
            //     success: function(내용){
            //     }
            // })

            // $.ajax({
            //     url: "http://openapi.seoul.go.kr:8088/***REMOVED_SEOUL_KEY***/xml/RealtimeCityAir/1/25/",
            //     success: function(asd){
            //         alert(asd); // 미작동
            //     }
            // })
            $.ajax({
                url: "http://localhost:8000/xml.test",
                success: function(xmlDoc){
                    $(xmlDoc).find("snack").each(function(i, s){
                        var s_name = $(s).find("s_name").text();
                        var s_price = $(s).find("s_price").text();
                        
                        var newRow = '<tr><td>' + s_name + '</td><td>' + s_price + '</td></tr>';
                        

                        $("table").append(newRow);
                    }); 
                }
            });

        </script>

    </head>
    <body>

        <table border="1">
            <tr>
                <th> 품명 </th>
                <th> 가격 </th>
            </tr>
        </table>

    </body>
</html>
