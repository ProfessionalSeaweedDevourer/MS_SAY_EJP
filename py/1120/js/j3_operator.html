<!DOCTYPE html>
<html>
    
    <head>
        <meta charset="utf-8">
        <title> 11/20 JS </title>
        <script>
            // 연산은 대체로 python과 유사하지만...
            var a = 10;
            var b = "A";

            var c = a + b; // 붙여버림
            alert(c);

            var d = a * b; // 
            alert(d);

            a += 1;
            alert(a);

            a++;
            a--;
            alert(a);

            // 논리 연산
            // AND && / &
            // OR || / |
            // NOT !
            // 예시
            var e = (a>=5) && (b=="A");
            alert(e); 

            // 조건의 구현: a>=5면 a, 아니면 b가 되는 e 만들기
            var f = (a>=5)? "a" : "b";
            alert(f);

        </script>
    </head>

</html>
