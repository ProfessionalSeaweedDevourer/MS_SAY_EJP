<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title> - </title>
        <script src="jQuery.js"></script>

        <script>
            
            $(function(){
                
                $(document).contextmenu(function () {
                    return false; // 기본 우클릭 팝업 차단
                 })


                 // 우클릭 위치에서 메뉴 테이블 소환
                $("html").mouseup(function (e){
                    if (e.button == 2){
                        $("table").css("top", e.pageY + "px")
                        $("table").css("left", e.pageX + "px");
                        $("table").css("opacity", "1")

                        setTimeout(function(){
                            $("table").css("top", "-100px");
                            $("table").css("left", "-100px");
                            $("table").css("opacity", "0");

                        }, 2000);

                    }

                })


            })


        </script>

        <style> 
            table{
                position: absolute;
                opacity: 0;
                top: -100px;
                left: -100px;
                transition: opacity 0.5s ease-out;
            }
        </style>

    </head>
    
    <body>

    <table border="1">
        <tr>
            <td id = "menu1"><a href="https://www.google.com"> Google </a></td>
        </tr>
        <tr>
            <td id = "menu2"><a href="https://www.youtube.com"> Youtube </a></td>
        </tr>
        <tr>
            <td id = "menu3"><a href="https://www.github.com"> Github </a></td>
        </tr>

    </body>

</html>
