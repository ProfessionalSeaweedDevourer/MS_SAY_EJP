<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>JavaScript Vanilla Example</title>

        <script>
            function showInputValue() {
                const inputElement = document.querySelector('input');
                alert(inputElement.value);
            }
        </script>

    </head>

    <body>
    
        <input><br>
        <button onclick="showInputValue()"> 버튼 </button>
    
    </body>

</html>
