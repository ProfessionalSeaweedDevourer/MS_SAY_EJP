<!DOCTYPE html>
    <head>
        <meta charset="utf-8">
        <title> HTML5 Basics </title>
        <script src="jQuery.js"></script>
        <script>

            $(function(){
                // HTML 4.01: active-x, flash 등 add-on으로 기능 구현
                // HTML5: HTML 자체만으로 각종 기능 구현
                var paper = document.getElementById("cv");
                var pen = paper.getContext("2d");

                pen.fillRect(10,20,30,40); // x, y, w, h
                pen.fillStyle = "#ff0000"; // '펜 색'을 빨강으로 변경, 앞으로 그리는 것들은 빨간색이 됨
                pen.fillRect(40,60,100,50);

                $("#cv").mouseup(function (e){
                    pen.fillRect(e.pageX, e.pageY, 30, 30);
                })

            })


        </script>

        <style>
            canvas {
                border: black solid 2px;
                
            }
        </style>

    </head>
    
    <body>

        <!-- html5만의 기능: canvas. '그릴 수 있는 공간'.-->
        <canvas id="cv" width="300px" height="400px">
            
        </canvas> 

    </body>

</html>
