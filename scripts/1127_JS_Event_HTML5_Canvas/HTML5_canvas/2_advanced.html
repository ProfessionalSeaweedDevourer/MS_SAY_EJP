<!DOCTYPE html>
    <head>
        <meta charset="utf-8">
        <title> HTML5 Basics </title>
        <script src="jQuery.js"></script>
        <script>

            $(function(){
                // HTML 4.01: active-x, flash 등 add-on으로 기능 구현
                // HTML5: HTML 자체만으로 각종 기능 구현
                var paper = document.getElementById("cv");
                var pen = paper.getContext("2d");
   
                // pen.fillStyle = "#ff6f91"; // '펜 색'을 변경

                // pen.shadowOffsetX = 3;
                // pen.shadowOffsetY = 3;
                // pen.shadowBlur = 5;
                // pen.shadowColor = "#9a67a5"

                // pen.fillRect(10,20,30,40); // x, y, w, h

                setInterval(function (){
                    pen.save(); // 그림자 세팅 전의 펜 상태를 저장

                    pen.fillStyle = "#00000011"
                    pen.fillRect(0,0, 300, 400)

                    var x = Math.random() * 300;
                    var y = Math.random() * 400;

                    var r = Math.random() * 255;
                    var g = Math.random() * 255;
                    var b = Math.random() * 255;
                    var color = "rgb(" +r+ "," +g+", " +b+" )";

                    pen.shadowOffsetX = 0;
                    pen.shadowOffsetY = 0;
                    pen.shadowBlur = 5;
                    pen.shadowColor = "#f7f5dd"

                    pen.fillStyle = color;
                    pen.fillRect(x, y, 10,10);

                    pen.restore();
                }, 100); // 0.03초마다 발동

                // 선 그리기
                // pen.beginPath();
                // pen.moveTo(40,60);
                // pen.lineTo(140, 160);
                // pen.closePath()

                // pen.strokeStyle = "#ff6f91"; // 선 색상
                // pen.lineWidth = 2;          // 선 두께: 어째서인지 stroke가 아니라 line으로 표기
                
                // pen.stroke();

                // $("#cv").mouseup(function (e){
                //     pen.fillRect(e.pageX, e.pageY, 30, 30);
                // })

                // var a = new Image();
                // a.src = "popcat.png";
                // a.onload = function(){
                //     pen.drawImage(a, 100, 200, 100, 100); // 그림의 x, y, w, h
                // }


            })


        </script>

        <style>
            canvas {
                border: black solid 2px;
                
            }
        </style>

    </head>
    
    <body>

        <!-- html5만의 기능: canvas. '그릴 수 있는 공간'.-->
        <canvas id="cv" width="300px" height="400px">
            
        </canvas> 

    </body>

</html>
