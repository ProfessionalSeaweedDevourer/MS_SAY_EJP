<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title> DOM </title>
        <script src="jQuery.js"></script>

        <script>
        var catstate = 0;

            $(function(){
                
                // <태그 속성="값"> 텍스트 </태그>
                $("#b1").click(function (){
                    $("a").html("<b> 유튜브로 </b>")
                    // $("a").text("<b> 유튜브로 </b>") // 텍스트로 받기 때문에 태그 미작동.
                })
                
                $("#b2").click(function (){
                    alert( $("a").text() );
                })

                $("#b3").click(function(){
                    $("a").attr("href", "https://www.youtube.com");
                    $("a").attr("target", "_blank");
                })

                $("#b4").click(function(){
                    alert($("a").href());
                })

                $("#cat").click(function(){

                    if (catstate == 0){
                        $("img").attr("src", "cursedcat2_2.png")
                        catstate = 1;
                    }
                    else if (catstate == 1) {
                        $("img").attr("src", "cursedcat2_1.png")
                        catstate = 0;
                    }
                })

                $("#b7").click(function(){
                    $("<marquee></marquee>").attr("behavior", "alternate")
                })

                $("#b8").click(function(){
                    // $("div").remove(); // div 자체를 없애버림
                    $("div").empty(); // div의 내용물을 비움
                })
                
            })
        </script>

    </head>

    <body>
        <a href="https://www.google.com"> Google </a>
        <hr>
        
        <button id="b1"> 텍스트 추가 / 수정 </button>
        
        <button id="b2"> 텍스트 확인 </button>
        <hr>

        <button id="b3"> 속성 추가 / 수정 / 삭제 </button>
        <button id="b4"> 속성 확인 </button>
        <hr>

        <img id="cat" src="cursedcat2_1.png">
        
        <button id="b7"> 움직이기 </button>
        <button id="b8"> 뿅 </button>



    </body>

</html>
