<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>1117</title>
    <style>
        div {
            font-size: 30pt;
        }
        #aaa {
            color: #43a047;
        }
        .qqq{
            background-color: yellow;
        }
        #bbb, .qqq{
            text-decoration: underline;
        }
        div h1{
                        /* x y blur color */
            text-shadow: 2px 3px 5px red; 
        }
        h1.qqq{
            box-shadow: 5px 5px 5px green;
        }
        .eee.www.qqq{
            cursor: pointer;
        }
        h2:hover{
            color:yellow;
        }
        h2:active{
            color: red;
        }
    </style>
</head>

<body>
    <h2>ㅎㅇ</h2>
    <div>ㅠㅠㅠ<h1>ㅠㅠ</h1>ㅠㅠㅠㅠㅠㅠㅠㅠㅠㅠㅠ</div>
    <div id="aaa" class="qqq">ㅋㅋㅋ</div>
    <div id="bbb">ㅎㅎㅎ</div>
    <h1 class="qqq www eee">ㅇㅇ</h1>
    <h1>ㅠㅠ</h1>
    <!--
        CSS(Cascading Style Sheet)
            HTML DOM객체에 디자인 입혀주는 디자인 언어
            HTML의 디자인부분 서포트
            위치 : .html내부/.css/DOM객체 속성
            문법 : 
                CSSSelector {
                    속성: 값;
                    속성: 값;
                    ...
                }
            CSSSelector : CSS할때 쓰는건데, 다양한 분야에서 많이 사용
                기본형
                    태그명
                    #id
                    .class
                조합형
                    기본형, 기본형
                    기본형 기본형
                    기본형.class
                상태형
                    기본형:상태
    -->
</body>

</html>
