<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>JavaScript Vanilla Example</title>

        <script>
            // JS는 문법이 길고 에러를 잡기 힘들다.
            // main 영역이 따로 없기 때문에, body의 load 이벤트에 의존한다.

            function abcd(){
                var z = document.getElementById("zvxc");
            }

            function showAlertt(){
                alert(z.value);
            }

        </script>

    </head>

    <body onload="abcd()">
    
        <input id="zvxc"><br>
        <button onclick="showAlertt()"> 버튼 </button>
    
    </body>

</html>
