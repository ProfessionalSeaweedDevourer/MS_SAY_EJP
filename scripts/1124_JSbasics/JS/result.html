<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>상품 정보 확인</title>
        <script>
            // 페이지 로드 시 실행될 함수
            window.onload = function() {
                // 1. 현재 페이지의 URL 쿼리 문자열 파싱 (예: "?productName=ABC&price=1000")
                const params = new URLSearchParams(window.location.search);

                // 2. 쿼리 문자열에서 'productName'과 'price' 값 가져오기
                const productName = params.get('productName');
                const price = params.get('price');

                // 3. 가져온 값을 HTML 요소에 삽입
                document.getElementById('displayProductName').textContent = productName || '정보 없음';
                document.getElementById('displayPrice').textContent = price || '정보 없음';
            };
        </script>
    </head>

     <body>
        <h2>등록된 상품 정보</h2>
        <p>제품명: <span id="displayProductName"></span></p>
        <p>가격: <span id="displayPrice"></span></p>
        <hr>
    </body>
</html>
