<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>테이블 활용 테스트</title>
    </head>
    
    <body>
        <table border = "1" width = "200" height = "200"> 
            <tr> <!-- table row: 표의 행 -->
                <td>1</td> <!-- table data: 표의 각 칸. 하나의 row 안에 들어감 -->
                <td>2</td>
                <td>3</td>
            </tr>
            <tr> <!-- row를 더 추가하면 행이 더 생겨요 -->
                <td>1</td>
                <td>2</td>
                <td>3</td>
            </tr>
        </table>
    </body>
</html>
